<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isabella Langer Coaching</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FAFAFA; height: 100dvh; display: flex; flex-direction: column; }

  #header { padding: 14px 20px; background: #FAFAFA; border-bottom: 1px solid #C8E6D0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #logo { height: 42px; object-fit: contain; }
  #reset-btn { background: none; border: 1px solid #C8E6D0; border-radius: 8px; padding: 6px 12px; cursor: pointer; color: #5E5B52; font-size: 12px; font-family: inherit; display: flex; align-items: center; gap: 5px; }
  #reset-btn:hover { background: #EBF5EE; }

  #messages { flex: 1; overflow-y: auto; padding: 1.25rem 1rem 0.5rem; display: flex; flex-direction: column; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: #C8E6D0; border-radius: 4px; }

  .msg { display: flex; margin-bottom: 1rem; }
  .msg.user { justify-content: flex-end; }
  .msg.assistant { justify-content: flex-start; }
  .bubble { max-width: 80%; padding: 12px 16px; font-size: 15px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .msg.user .bubble { background: #3D3A31; color: #FAFAFA; border-radius: 18px 18px 4px 18px; }
  .msg.assistant .bubble { background: #EBF5EE; color: #3D3A31; border-radius: 18px 18px 18px 4px; border: 1px solid #C8E6D0; }

  .typing { display: flex; justify-content: flex-start; margin-bottom: 1rem; }
  .typing-inner { background: #EBF5EE; border: 1px solid #C8E6D0; border-radius: 18px 18px 18px 4px; padding: 12px 20px; display: flex; gap: 5px; align-items: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #5E5B52; animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

  #error { margin: 0 1rem 1rem; padding: 10px 14px; background: #FEF0EE; border: 1px solid #F5C4B3; border-radius: 8px; font-size: 13px; color: #993C1D; display: none; }

  #input-area { padding: 12px 16px 16px; border-top: 1px solid #C8E6D0; background: #FAFAFA; flex-shrink: 0; }
  #input-box { display: flex; align-items: flex-end; gap: 8px; background: #EBF5EE; border: 1px solid #C8E6D0; border-radius: 14px; padding: 8px 8px 8px 16px; }
  #textarea { flex: 1; background: none; border: none; outline: none; font-size: 15px; line-height: 1.5; color: #3D3A31; font-family: inherit; resize: none; min-height: 24px; max-height: 160px; overflow-y: auto; }
  #textarea::placeholder { color: #5E5B5299; }
  #send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #C8E6D0; color: #3D3A31; cursor: default; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; font-size: 18px; line-height: 1; }
  #send-btn.active { background: #3D3A31; color: #FAFAFA; cursor: pointer; }

  #footer-links { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 0 10px; margin-top: 8px; }
  .footer-text { font-size: 11px; color: #5E5B5299; letter-spacing: 0.01em; }
  .footer-sep { font-size: 11px; color: #C8E6D0; }
  .footer-link { font-size: 11px; color: #5E5B5299; text-decoration: none; letter-spacing: 0.01em; }
  .footer-link:hover { color: #5E5B52; }
</style>
</head>

<script>
const SYSTEM = 'Du bist ein KI-Assistent, der Frauen zwischen 38 und 48 Jahren dabei hilft, ihre berufliche Situation besser einzuordnen. Du bist ein Bonus für Teilnehmerinnen von Isabellas Webinar Berufliche Neuorientierung.\n\nDEIN CHARAKTER:\nDu bist ruhig, klar, direkt, ehrlich, warm und erwachsen. Humorvoll wenn es passt. Du klingst wie eine kluge, vertrauenswürdige Person nicht wie eine KI oder ein Coach.\n\nVERBOTENE SPRACHE:\nNiemals: Du darfst..., Erlaube dir..., Begib dich auf deine Reise..., Alles steckt in dir..., Ich begleite dich..., Du bist nicht allein..., Motivationssprüche, Esoterik, Coaching-Floskeln. Keine künstlich emotionale Sprache.\n\nDEINE KERNAUFGABEN:\n- Situation erst wirklich verstehen, bevor du irgendetwas sagst\n- Immer nur EINE Frage auf einmal stellen\n- Aktiv zuhören und frühere Aussagen wieder aufgreifen\n- Widersprüche freundlich benennen\n- Muster erkennen und konkret ansprechen\n- Nie sofort Lösungen liefern\n\nGESPRÄCHSSTRUKTUR:\nPhase 1 Verstehen: Was ist die konkrete Situation? Was stört genau? Seit wann?\nPhase 2 Vertiefen: Was steckt dahinter? Was hat sich verändert?\nPhase 3 Muster: Was fällt auf? Gibt es einen roten Faden?\nPhase 4 Perspektive: Was wäre anders, wenn es besser wäre? Was ist überhaupt möglich?\nPhase 5 Schritt: Welcher EINE kleine Schritt ist heute sinnvoll?\n\nKONKRETER NÄCHSTER SCHRITT am Gesprächsende:\nDer Schritt muss in 24 Stunden umsetzbar sein, klein und konkret sein, direkt mit dem Gespräch zusammenhängen und erklärt werden WARUM dieser Schritt jetzt sinnvoll ist.\n\nWISSENSBASIS fließt natürlich ins Gespräch ein niemals dozierend:\n- Eine Ausbildung ist kein Vertrag fürs Leben\n- Gut können bedeutet nicht das muss dein Beruf sein\n- Du musst heute nicht wissen wohin, nur ob du weitermachen kannst\n- Du fängst nicht bei null an\n- Veränderung beginnt oft lange vor der Kündigung\n- Berufliche Unzufriedenheit entsteht über Jahre, nicht plötzlich\n\nUMGANG MIT FRUSTRATION:\nWenn jemand sagt das Gespräch hilft nicht, nimmst du das sofort auf: Okay, dann lass mich anders fragen. Niemals ignorieren und weitermachen wie bisher.\n\nWIEDERHOLUNG ERKENNEN:\nWenn jemand zum dritten Mal dasselbe sagt: Freundlich benennen. An diesem Punkt kann ein persönliches Gespräch mit Isabella mehr leisten als ich hier.\n\nGESPRÄCHSABSCHLUSS immer am Ende:\n1. Kurze ehrliche Zusammenfassung in 2-3 Sätzen\n2. Ein konkreter nächster Schritt mit Erklärung warum\n3. Buchungseinladung: Wenn du das Gefühl hast dass jetzt der richtige Moment wäre, deine Situation wirklich anzugehen - Isabella bietet unverbindliche Erstgespräche an: https://calendly.com/isabellalangercoaching/30min\n\nGRENZEN:\n- Bei Hinweisen auf psychische Krisen oder Suizidgedanken: Klar auf professionelle Hilfe hinweisen. Krisentelefon: 0800 111 0 111\n- Nie zur Kündigung raten, nie konkrete Berufsentscheidungen treffen';

let loading = false;

const messagesEl = document.getElementById('messages');

function linkify(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*{0,2}\[([^\]]+)\]\((https?:\/\/[^)]+)\)\*{0,2}/g, '<a href="$2" target="_blank" rel="noopener" style="color:#3D3A31;text-decoration:underline;text-underline-offset:3px;">$1</a>')
    .replace(/\*{0,2}(https?:\/\/[^\s*)<]+)\*{0,2}/g, '<a href="$1" target="_blank" rel="noopener" style="color:#3D3A31;text-decoration:underline;text-underline-offset:3px;">$1</a>');
}
function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'assistant') {
    bubble.innerHTML = linkify(content).replace(/\n/g, '<br>');
  } else {
    bubble.textContent = content;
  }
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<div class="typing-inner"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function updateBtn() {
  if (textarea.value.trim() && !loading) {
    sendBtn.classList.add('active');
  } else {
    sendBtn.classList.remove('active');
  }
}

function resetChat() {
  history = [];
  messagesEl.innerHTML = '';
  errorEl.style.display = 'none';
  addMessage('assistant', WELCOME);
}

async function send() {
  const text = textarea.value.trim();
  if (!text || loading) return;
  loading = true;
  errorEl.style.display = 'none';
  history.push({ role: 'user', content: text });
  addMessage('user', text);
  textarea.value = '';
  textarea.style.height = 'auto';
  updateBtn();
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    const reply = data.content?.[0]?.text || '';
    history.push({ role: 'assistant', content: reply });
    hideTyping();
    addMessage('assistant', reply);
  } catch(e) {
    hideTyping();
    errorEl.textContent = 'Etwas hat nicht geklappt. Bitte versuche es erneut.';
    errorEl.style.display = 'block';
    history.pop();
  } finally {
    loading = false;
    updateBtn();
  }
}

textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
  updateBtn();
});

textarea.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

sendBtn.addEventListener('click', send);

resetChat();
</script>
</body>
</html>
